<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfraTech Dashboard | Live Construction Metrics</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <i class="fas fa-hard-hat"></i>
            <span>InfraTech</span>
        </div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="why.html">Why InfraTech</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="dashboard.html" class="active btn-dashboard">Dashboard</a></li>
        </ul>
        <div class="live-clock" id="liveClock"></div>
    </nav>

    <main class="dashboard-container">
        <!-- KPI cards -->
        <div class="kpi-grid" id="kpiGrid"></div>

        <!-- Projects & Equipment -->
        <div class="main-grid">
            <section class="projects-panel">
                <h2><i class="fas fa-draw-polygon"></i> Active Projects</h2>
                <div id="projectsList" class="project-list"></div>
            </section>
            <section class="equipment-panel">
                <h2><i class="fas fa-tractor"></i> Fleet Status</h2>
                <div id="equipmentList" class="equipment-list"></div>
            </section>
        </div>

        <!-- Charts -->
        <div class="charts-row">
            <div class="chart-card">
                <h3><i class="fas fa-chart-line"></i> Material Consumption (tons)</h3>
                <canvas id="materialChart" width="400" height="200"></canvas>
            </div>
            <div class="chart-card">
                <h3><i class="fas fa-chart-pie"></i> Safety Incidents (last 30d)</h3>
                <canvas id="safetyChart" width="400" height="200"></canvas>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2025 InfraTech Solutions | Smart Construction Intelligence</p>
    </footer>

    <script src="script.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
